name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Languages activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: craftsamo
          template: classic
          filename: images/metrics-languages.svg
          base: ""
          config_display: large
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          output_action: commit
          committer_message: "chore: update metrics (languages)"

      - name: Follow-up (user)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: craftsamo
          template: classic
          filename: images/metrics-followup.svg
          base: ""
          config_display: large
          plugin_followup: yes
          plugin_followup_sections: user
          extras_css: |
            .column.largeable {
              display: flex !important;
              width: 100% !important;
            }
            .column.largeable > .row {
              gap: 24px;
              justify-content: center;
              width: 100% !important;
            }
            .column.largeable > .row > section {
              flex: 0 1 420px;
              min-width: 0;
            }
            svg.bar {
              display: block;
              height: 8px !important;
              margin: 4px 0 10px !important;
              max-width: 100%;
              transform: none !important;
              width: 420px !important;
            }
          extras_js: |
            document.querySelectorAll("svg.bar").forEach((bar) => {
              bar.setAttribute("viewBox", "0 0 220 8")
              bar.setAttribute("preserveAspectRatio", "none")
            })
          output_action: commit
          committer_message: "chore: update metrics (followup)"

      - name: Achievements
        uses: dkhokhlov/metrics@master
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: craftsamo
          template: classic
          filename: images/metrics-achievements.svg
          base: ""
          config_display: large
          plugin_achievements: yes
          plugin_achievements_threshold: C
          output_action: commit
          committer_message: "chore: update metrics (achievements)"
