name: Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: craftsamo
          outputs: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit snake SVGs
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore: update contribution snake"
          default_author: github_actions
          add: |
            images/github-contribution-grid-snake.svg
            images/github-contribution-grid-snake-dark.svg
